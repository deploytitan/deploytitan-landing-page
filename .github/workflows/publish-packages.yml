name: Publish Packages

on:
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  publish-design-tokens:
    name: Publish @deploytitan/design-tokens
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish
        run: pnpm --filter @deploytitan/design-tokens publish --no-git-checks --provenance --access public
